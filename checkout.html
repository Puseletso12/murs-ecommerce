<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- CHECKOUT PAGE -->
<div id="page-checkout" class="checkout-page">
  <h1 class="checkout-page-title">CHECKOUT</h1>
  <div class="checkout-grid">
    <div>
      <p class="checkout-section-title">SHIPPING INFORMATION</p>
      <div class="checkout-form">
        <div class="checkout-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" placeholder="First name" />
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" placeholder="Last name" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" class="form-input" placeholder="Street address" />
        </div>
        <div class="checkout-row">
          <div class="form-group">
            <label class="form-label">City</label>
            <input type="text" class="form-input" placeholder="City" />
          </div>
          <div class="form-group">
            <label class="form-label">Postal Code</label>
            <input type="text" class="form-input" placeholder="Postal code" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <input type="text" class="form-input" placeholder="Country" />
        </div>
        <p class="checkout-section-title" style="margin-top:40px;">PAYMENT</p>
        <div class="form-group">
          <label class="form-label">Card Number</label>
          <input type="text" class="form-input" placeholder="0000 0000 0000 0000" maxlength="19" />
        </div>
        <div class="checkout-row">
          <div class="form-group">
            <label class="form-label">Expiry</label>
            <input type="text" class="form-input" placeholder="MM / YY" maxlength="7" />
          </div>
          <div class="form-group">
            <label class="form-label">CVV</label>
            <input type="text" class="form-input" placeholder="CVV" maxlength="3" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Cardholder Name</label>
          <input type="text" class="form-input" placeholder="Name on card" />
        </div>
      </div>
    </div>
    <div class="order-summary">
      <p class="order-summary-title">ORDER SUMMARY</p>
      <div class="order-items" id="checkout-items"></div>
      <div class="order-totals" id="checkout-totals"></div>
      <button class="place-order-btn" onclick="placeOrder()">PLACE ORDER</button>
    </div>
  </div>
</div>

<!-- BAG OVERLAY -->
<div class="bag-overlay" id="bag-overlay">
  <div class="bag-backdrop" onclick="closeBag()"></div>
  <div class="bag-panel">
    <div class="bag-header">
      <span class="bag-title" id="bag-title">BAG (0)</span>
      <button class="bag-close" onclick="closeBag()">×</button>
    </div>
    <div class="bag-items" id="bag-items-container"></div>
    <div class="bag-footer">
      <div class="bag-totals" id="bag-totals"></div>
      <button class="checkout-btn" onclick="goToCheckout()">PROCEED TO CHECKOUT</button>
      <button class="continue-btn" onclick="closeBag()">CONTINUE SHOPPING</button>
    </div>
  </div>
</div>
</body>
</html>
